
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Creative Suite</title>
    
    <!-- Configurações para Android/PWA -->
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: #f5f5f5; 
            margin: 0; 
            overflow-x: hidden;
            /* Previne o scroll elástico e pull-to-refresh em WebViews Android */
            overscroll-behavior-y: contain;
            /* Desativa seleção de texto global para parecer app nativo */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Área segura para notches de celulares modernos */
        #root {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes flare {
          0% { filter: brightness(1) blur(0px); transform: scale(1); }
          50% { filter: brightness(3) blur(2px); transform: scale(1.05); }
          100% { filter: brightness(1) blur(0px); transform: scale(1); }
        }
        .animate-flare { animation: flare 3s ease-in-out infinite; }
        
        @keyframes grid-move {
          0% { transform: translateY(0); }
          100% { transform: translateY(40px); }
        }
        .bg-grid {
          background-size: 40px 40px;
          background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                            linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
          animation: grid-move 2s linear infinite;
        }

        @keyframes scanline {
          0% { bottom: 100%; }
          100% { bottom: 0%; }
        }
        .scanline {
          width: 100%;
          height: 2px;
          background: linear-gradient(to right, transparent, rgba(99, 102, 241, 0.2), transparent);
          position: absolute;
          animation: scanline 4s linear infinite;
          pointer-events: none;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Permitir seleção apenas em campos de texto */
        input, textarea { user-select: text !important; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
